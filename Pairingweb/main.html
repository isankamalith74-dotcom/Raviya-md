<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akira Bot - Pairing Code</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        button {
            width: 96%;
            padding: 12px;
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0369a1; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            display: none;
        }
        .code {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #4ade80;
        }
        .loading { color: #e2e8f0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>AKIRA BOT PAIRING</h2>
    <p>Enter your phone number with country code (e.g. 9477xxxxxxx)</p>
    
    <input type="text" id="phoneNumber" placeholder="94771234567">
    <button onclick="getPairingCode()">Get Pairing Code</button>

    <div id="resultBox" class="result-box">
        <p id="statusText" class="loading">Generating code...</p>
        <div id="pairingCode" class="code"></div>
    </div>
</div>

<script>
    async function getPairingCode() {
        const phone = document.getElementById('phoneNumber').value;
        const resultBox = document.getElementById('resultBox');
        const statusText = document.getElementById('statusText');
        const pairingCode = document.getElementById('pairingCode');

        if (!phone) {
            alert("Please enter a valid phone number!");
            return;
        }

        resultBox.style.display = 'block';
        statusText.innerText = "Connecting to WhatsApp server...";
        pairingCode.innerText = "";

        try {
            const response = await fetch(`/api/pair?phone=${phone}`);
            const data = await response.json();

            if (data.code) {
                statusText.innerText = "Your WhatsApp Pairing Code:";
                pairingCode.innerText = data.code;
            } else {
                statusText.innerText = "Error: " + data.error;
            }
        } catch (error) {
            statusText.innerText = "An error occurred. Please try again.";
        }
    }
</script>

</body>
</html>
